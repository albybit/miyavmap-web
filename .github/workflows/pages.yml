# Publishes the site: every push to main fast-syncs the gh-pages branch,
# which GitHub Pages serves (Settings → Pages → deploy from branch gh-pages).
# Pages was auto-enabled by the first gh-pages push — no Settings click needed.
# (The actions/deploy-pages flow needs Pages source = "GitHub Actions", which
# only a repo admin can set; this branch-sync pattern needs no admin at all.)
name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
